[build]
builder = "railpack"
buildCommand = "composer install --no-dev --optimize-autoloader && npm install --omit=dev && npm run build && php artisan config:cache && php artisan route:cache && php artisan view:cache"

[deploy]
preDeployCommand = ["php artisan migrate --force"]
startCommand = "php artisan serve --host=0.0.0.0 --port=${PORT:-8080} & while true; do php artisan queue:work --stop-when-empty --max-time=60 --tries=3 --sleep=3; sleep 5; done"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
