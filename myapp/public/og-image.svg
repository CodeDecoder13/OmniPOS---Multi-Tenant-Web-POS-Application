  <text x="82" y="340" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="38" font-weight="600" fill="rgba(255,255,255,0.95)" letter-spacing="-0.5">The All-in-One POS System</text>
  <text x="82" y="390" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="38" font-weight="600" fill="rgba(255,255,255,0.95)" letter-spacing="-0.5">for Philippine Businesses</text>

